name = "{PROJECT_PREFIX}-worker-{TENANT}"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "{KV_BINDING}"
id = "{KV_NAMESPACE_ID}"
preview_id = ""

[vars]
TENANT_ID = "{TENANT}"
SESSION_TIMEOUT_MINUTES = {SESSION_TIMEOUT}
RATE_LIMIT_PER_MINUTE = {RATE_LIMIT}
CACHE_TTL_USERS = {CACHE_TTL_USERS}
CACHE_TTL_CONFIG = {CACHE_TTL_CONFIG}
CACHE_TTL_ROLES = {CACHE_TTL_ROLES}
CACHE_TTL_ATTENDANCE = {CACHE_TTL_ATTENDANCE}
CACHE_TTL_NOTICEBOARD = {CACHE_TTL_NOTICEBOARD}
CACHE_TTL_TIMETABLE = {CACHE_TTL_TIMETABLE}
CACHE_TTL_MARKS = {CACHE_TTL_MARKS}
CACHE_TTL_VERIFY = {CACHE_TTL_VERIFY}
ENABLE_RATE_LIMIT = false
ENABLE_KV_CACHE = true

[env.production]
vars = { TENANT_ID = "{TENANT}" }
