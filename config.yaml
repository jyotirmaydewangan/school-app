# Project Configuration
# All hardcoded values should be configured here

project:
  # Prefix used for Cloudflare Worker/App names
  # Example: "myapp" -> "myapp-worker-{TENANT}" and "myapp-app-{TENANT}"
  namePrefix: "finance"
  
  # Prefix for localStorage/sessionStorage keys
  storagePrefix: "school_app"

defaults:
  # App display name
  appName: "My Finance"
  
  # Theme colors (can be overridden per tenant)
  theme:
    primaryColor: "#2563eb"
    secondaryColor: "#1e40af"
    accentColor: "#3b82f6"
    backgroundColor: "#f8fafc"
    textColor: "#1e293b"
  
  # Default user role for new registrations
  defaultRole: "student"
  
  # Session configuration
  sessionTimeoutMinutes: 30
  
  # Rate limiting (0 to disable)
  rateLimitPerMinute: 60
  
  # Cache TTL in seconds
  cacheTtlSeconds: 300
  
  # Allow new user registrations
  allowRegistration: true
  
  # Contact email shown in app
  contactEmail: ""
  
  # Logo and favicon URLs (leave empty to hide)
  logoUrl: ""
  faviconUrl: ""
  
  # Show "Powered by" footer
  showPoweredBy: false

# Cache configuration by resource type (in seconds)
# 2592000 = 1 month, 604800 = 1 week, 900 = 15 min
cache:
  users: 2592000
  config: 2592000
  roles: 2592000
  attendance: 604800
  noticeboard: 604800
  timetable: 2592000
  marks: 604800
  verify: 900
  default: 60

# KV Store Cache Settings
kvCache:
  # Enable KV-based caching (requires KV namespace)
  enabled: true
  
  # Stale-while-revalidate: serve stale data while refreshing
  # Value is percentage of TTL (e.g., 50 = serve stale for 50% of TTL after expiry check)
  staleWhileRevalidatePercent: 50

# Cloudflare KV Namespace
# Create with: wrangler kv namespace create DATA_CACHE
kv:
  namespaceId: "58169d47324f4b98ae96b19ff9379693"
  binding: "DATA_CACHE"

# Default roles and permissions
roles:
  admin:
    permissions: ["*"]
    isActive: true
    pages: ["dashboard", "students", "attendance", "exams", "marks", "timetable", "curriculum", "users", "settings"]
  teacher:
    permissions: ["read:students", "write:students", "read:attendance", "write:attendance", "read:marks", "write:marks", "read:timetable", "write:timetable", "read:syllabus", "write:syllabus", "read:resources", "write:resources", "read:subjects", "write:subjects"]
    isActive: true
    pages: ["dashboard", "students", "attendance", "exams", "marks", "timetable", "curriculum"]
  parent:
    permissions: ["read:own_child", "read:child_attendance", "read:child_marks", "read:child_timetable", "read:notices"]
    isActive: true
    pages: ["dashboard", "attendance", "marks", "timetable", "curriculum", "communication"]
  student:
    permissions: ["read:own_grades", "read:own_attendance", "read:own_timetable"]
    isActive: true
    pages: ["dashboard", "attendance", "marks", "timetable", "curriculum"]
