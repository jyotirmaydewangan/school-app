# Project Configuration
# All hardcoded values should be configured here

project:
  # Prefix used for Cloudflare Worker/App names
  # Example: "myapp" -> "myapp-worker-{TENANT}" and "myapp-app-{TENANT}"
  namePrefix: "finance"
  
  # Prefix for localStorage/sessionStorage keys
  storagePrefix: "school_app"

defaults:
  # App display name
  appName: "My School"
  
  # Theme colors (can be overridden per tenant)
  theme:
    primaryColor: "#2563eb"
    secondaryColor: "#1e40af"
    accentColor: "#3b82f6"
    backgroundColor: "#f8fafc"
    textColor: "#1e293b"
  
  # Default user role for new registrations
  defaultRole: "student"
  
  # Session configuration
  sessionTimeoutMinutes: 30
  
  # Auth configuration
  auth:
    verifyCacheDurationMs: 300000 # 5 minutes
    tokenExpiringThresholdMs: 360000 # 60 minute
  
  # Rate limiting (0 to disable)
  rateLimitPerMinute: 60
  
  # Cache TTL in seconds
  cacheTtlSeconds: 300
  
  # Allow new user registrations
  allowRegistration: true
  
  # Contact email shown in app
  contactEmail: ""
  
  # Logo and favicon URLs (leave empty to hide)
  logoUrl: ""
  faviconUrl: ""
  
  # Show "Powered by" footer
  showPoweredBy: false

  # Max days in the past allowed to mark attendance (including today)
  maxAttendanceBackDays: 3

# Cache configuration Defaults (in seconds)
cache:
  version: "v1"
  default: 2592000 # 1 month
  ttls:
    oneMonth: 2592000
    oneWeek: 604800
    oneDay: 86400
    fifteenMin: 900
    oneMin: 60
  # CACHE_POLICY defines the rules for every read action.
  policy:
    getConfig: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getSchools: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getClasses: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getSections: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getRoles: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getSubjects: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getUsers: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getStudents: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getTimetable: { scope: GLOBAL, ttl: 604800, isBroad: true }
    getExams: { scope: GLOBAL, ttl: 604800, isBroad: true }
    getSyllabus: { scope: GLOBAL, ttl: 604800, isBroad: true }
    getResources: { scope: GLOBAL, ttl: 604800, isBroad: true }
    getNoticeboard: { scope: GLOBAL, ttl: 604800, isBroad: true }
    getNotices: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getDashboardStats: { scope: GLOBAL, ttl: 900, isBroad: true }
    getAttendance: { scope: USER, ttl: 604800, isBroad: false }
    getAttendanceByClass: { scope: GLOBAL, ttl: 2592000, isBroad: true, keyParameters: [class, section, year, month] }
    getAttendanceByClassAndYear: { scope: GLOBAL, ttl: 172800, isBroad: true, keyParameters: [class, section, year] }
    getAttendanceSummary: { scope: USER, ttl: 86400, isBroad: false }
    getMarks: { scope: USER, ttl: 604800, isBroad: false }
    getLinkedStudents: { scope: GLOBAL, ttl: 2592000, isBroad: true }
    getPendingRegistrations: { scope: GLOBAL, ttl: 60, isBroad: true }
    verify: { scope: SESSION, ttl: 900, isBroad: true }

  # INVALIDATION_MAP maps write actions to the read caches they must invalidate.
  invalidationMap:
    register: [getUsers, verify]
    login: [verify]
    logout: [verify]
    approveUser: [getPendingRegistrations, getUsers]
    rejectUser: [getPendingRegistrations]
    createUser: [getUsers, verify]
    updateUser: [getUsers, verify]
    deleteUser: [getUsers, verify]
    updateUserRole: [getUsers, verify]
    createRole: [getRoles, getUsers, verify]
    updateRole: [getRoles, getUsers, verify]
    deleteRole: [getRoles, getUsers, verify]
    createSchool: [getSchools]
    updateSchool: [getSchools]
    deleteSchool: [getSchools]
    createClass: [getClasses]
    updateClass: [getClasses]
    deleteClass: [getClasses]
    createSection: [getSections]
    updateSection: [getSections]
    deleteSection: [getSections]
    createStudent: [getStudents, getDashboardStats]
    updateStudent: [getStudents, getDashboardStats]
    deleteStudent: [getStudents, getDashboardStats]
    approveStudent: [getStudents, getDashboardStats]
    linkParentStudent: [getLinkedStudents]
    autoLinkParents: [getLinkedStudents]
    markAttendance: [getAttendance, getAttendanceByClass, getAttendanceByClassAndYear, getAttendanceSummary, getDashboardStats]
    createExam: [getExams, getDashboardStats]
    updateExam: [getExams]
    deleteExam: [getExams]
    enterMarks: [getMarks, getDashboardStats]
    calculateGrades: [getMarks]
    setTimetable: [getTimetable]
    deleteTimetable: [getTimetable]
    createSubject: [getSubjects]
    updateSubject: [getSubjects]
    deleteSubject: [getSubjects]
    addSyllabus: [getSyllabus]
    updateSyllabus: [getSyllabus]
    deleteSyllabus: [getSyllabus]
    addResource: [getResources]
    deleteResource: [getResources]

# Academic Configuration
academic:
  daysOfWeek: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]
  periods:
    1: { start: "08:00", end: "08:45" }
    2: { start: "08:45", end: "09:30" }
    3: { start: "09:30", end: "10:15" }
    4: { start: "10:15", end: "11:00" }
    5: { start: "11:00", end: "11:45" }
    6: { start: "11:45", end: "12:30" }
    7: { start: "12:30", end: "13:15" }
    8: { start: "13:15", end: "14:00" }

worker:
  tenantIdDefault: "unknown"

# KV Store Cache Settings
kvCache:
  enabled: true
  staleWhileRevalidatePercent: 50

# Cloudflare KV Namespace
kv:
  namespaceId: "58169d47324f4b98ae96b19ff9379693"
  binding: "DATA_CACHE"

# Default roles and permissions
# permissions: ["*"] means full access to everything
# pages: ["*"] means visible in navigation
# Noticeboard permissions:
#   read:noticeboard  — can view all notices
#   write:noticeboard — can create / edit / delete notices
# User Management permissions:
#   read:users  — can view the User Management page and list users
#   write:users — can create / edit / delete / approve users
roles:
  admin:
    permissions: ["*"]
    isActive: true
    pages: ["*"]
  teacher:
    permissions:
      - "read:students"
      - "write:students"
      - "read:attendance"
      - "write:attendance"
      - "read:marks"
      - "write:marks"
      - "read:timetable"
      - "write:timetable"
      - "read:curriculum"
      - "write:curriculum"
      - "read:noticeboard"
      - "write:noticeboard"
    isActive: true
    pages: ["dashboard", "noticeboard", "students", "attendance", "exams", "marks", "timetable", "curriculum"]
  parent:
    permissions:
      - "read:own_child"
      - "read:child_attendance"
      - "read:child_marks"
      - "read:child_timetable"
      - "read:noticeboard"
    isActive: true
    pages: ["dashboard", "noticeboard", "attendance", "marks", "timetable", "curriculum"]
  student:
    permissions:
      - "read:own_grades"
      - "read:own_attendance"
      - "read:own_timetable"
      - "read:noticeboard"
    isActive: true
    pages: ["dashboard", "noticeboard", "attendance", "marks", "timetable", "curriculum"]

# Action-level permission requirements
# Maps each write action to the permission it requires.
# Checked at Worker level (before proxying) AND Apps Script level (double enforcement).
# Add new entries here to gate any future feature — no code changes needed.
permissions:
  actionRequirements:
    # Noticeboard
    createNotice:  "write:noticeboard"
    updateNotice:  "write:noticeboard"
    deleteNotice:  "write:noticeboard"
    getNotices:    "read:noticeboard"
    # User Management
    # write:users — create, update, delete, approve/reject users and roles
    # read:users  — list users (getUsers)
    getUsers:      "read:users"
    createUser:    "write:users"
    updateUser:    "write:users"
    deleteUser:    "write:users"
    approveUser:   "write:users"
    rejectUser:    "write:users"
    updateUserRole: "write:users"
    # Role management is an admin-only sub-feature of user management
    createRole:    "write:users"
    updateRole:    "write:users"
    deleteRole:    "write:users"
